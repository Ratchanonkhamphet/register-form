<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มลงทะเบียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="min-h-screen flex items-center justify-center p-5">
        <div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-6">ลงทะเบียน</h1>

            <form id="registerForm" novalidate>
                <div class="mb-4">
                    <label for="firstName" class="block mb-2 font-medium text-gray-700">
                        ชื่อ
                    </label>
                    <input type="text" id="firstName" name="firstName" class="border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="error-message" id="firstNameError"></span>
                </div>

                <div class="mb-4">
                    <label for="lastName" class="block mb-2 font-medium text-gray-700">
                        นามสกุล
                    </label>
                    <input type="text" id="lastName" name="lastName" class="border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="error-message" id="lastNameError"></span>
                </div>

                <div class="mb-4">
                    <label for="phone" class="block mb-2 font-medium text-gray-700">
                        เบอร์โทรศัพท์
                    </label>
                    <input type="tel" id="phone" name="phone" class="border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="mb-4">
                    <label for="email" class="block mb-2 font-medium text-gray-700">
                        Email
                    </label>
                    <input type="email" id="email" name="email" class="border border-gray-300 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <span class="error-message" id="emailError"></span>
                </div>

                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
