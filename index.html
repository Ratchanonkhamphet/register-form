<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มลงทะเบียน</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div class="min-h-screen flex items-center justify-center p-5">

        <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-md">

            <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
                ลงทะเบียน
            </h1>

            <form id="registerForm" novalidate>

                <!-- ชื่อ -->
                <div class="mb-4">
                    <label for="firstName" class="block mb-2 font-medium text-gray-700">
                        ชื่อ
                    </label>

                    <input
                        type="text"
                        id="firstName"
                        name="firstName"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <span
                        id="firstNameError"
                        class="error-message block mt-1 text-sm text-red-500">
                    </span>
                </div>

                <!-- นามสกุล -->
                <div class="mb-4">
                    <label for="lastName" class="block mb-2 font-medium text-gray-700">
                        นามสกุล
                    </label>

                    <input
                        type="text"
                        id="lastName"
                        name="lastName"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <span
                        id="lastNameError"
                        class="error-message block mt-1 text-sm text-red-500">
                    </span>
                </div>

                <!-- เบอร์โทรศัพท์ -->
                <div class="mb-4">
                    <label for="phone" class="block mb-2 font-medium text-gray-700">
                        เบอร์โทรศัพท์
                    </label>

                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <span
                        id="phoneError"
                        class="error-message block mt-1 text-sm text-red-500">
                    </span>
                </div>

                <!-- Email -->
                <div class="mb-6">
                    <label for="email" class="block mb-2 font-medium text-gray-700">
                        Email
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <span
                        id="emailError"
                        class="error-message block mt-1 text-sm text-red-500">
                    </span>
                </div>

                <!-- ปุ่ม Submit -->
                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">
                    Submit
                </button>

            </form>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
